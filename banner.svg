<svg width="900" height="250" viewBox="0 0 900 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="45%" style="stop-color:#091220"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <style>
      @keyframes nodePulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.95; }
      }
      @keyframes lineFade {
        0%, 100% { opacity: 0.05; }
        50% { opacity: 0.4; }
      }
      @keyframes cursorBlink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes statusPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes subtitleFade {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 0.85; }
      }
      .n1  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 0.0s; }
      .n2  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 0.6s; }
      .n3  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 1.2s; }
      .n4  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 1.8s; }
      .n5  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 2.4s; }
      .n6  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 0.3s; }
      .n7  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 0.9s; }
      .n8  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 1.5s; }
      .n9  { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 2.1s; }
      .n10 { animation: nodePulse 3.4s ease-in-out infinite; animation-delay: 2.7s; }
      .e1  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 0.0s; }
      .e2  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 0.7s; }
      .e3  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 1.4s; }
      .e4  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 2.1s; }
      .e5  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 2.8s; }
      .e6  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 0.35s; }
      .e7  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 1.05s; }
      .e8  { animation: lineFade 4.2s ease-in-out infinite; animation-delay: 3.5s; }
      .cursor  { animation: cursorBlink 1.1s step-end infinite; }
      .status  { animation: statusPulse 2.2s ease-in-out infinite; }
      .tagline { animation: subtitleFade 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" fill="url(#bgGrad)" rx="6"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.025" stroke="#58A6FF" stroke-width="0.6">
    <line x1="0"   y1="50"  x2="900" y2="50"/>
    <line x1="0"   y1="100" x2="900" y2="100"/>
    <line x1="0"   y1="150" x2="900" y2="150"/>
    <line x1="0"   y1="200" x2="900" y2="200"/>
    <line x1="90"  y1="0"   x2="90"  y2="250"/>
    <line x1="180" y1="0"   x2="180" y2="250"/>
    <line x1="270" y1="0"   x2="270" y2="250"/>
    <line x1="630" y1="0"   x2="630" y2="250"/>
    <line x1="720" y1="0"   x2="720" y2="250"/>
    <line x1="810" y1="0"   x2="810" y2="250"/>
  </g>

  <!-- HUD corner brackets -->
  <g fill="none" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <!-- top-left -->
    <polyline points="12,34 12,12 34,12"/>
    <!-- top-right -->
    <polyline points="888,34 888,12 866,12"/>
    <!-- bottom-left -->
    <polyline points="12,216 12,238 34,238"/>
    <!-- bottom-right -->
    <polyline points="888,216 888,238 866,238"/>
  </g>

  <!-- ── LEFT NEURAL CLUSTER ── -->
  <!-- Edges -->
  <line class="e1" x1="44"  y1="70"  x2="100" y2="108" stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e2" x1="68"  y1="160" x2="100" y2="108" stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e3" x1="100" y1="108" x2="162" y2="84"  stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e4" x1="100" y1="108" x2="168" y2="152" stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e5" x1="162" y1="84"  x2="168" y2="152" stroke="#7EE787" stroke-width="0.7" fill="none"/>
  <line class="e6" x1="44"  y1="70"  x2="68"  y2="160" stroke="#58A6FF" stroke-width="0.6" fill="none"/>
  <!-- Nodes -->
  <circle class="n1" cx="44"  cy="70"  r="3"   fill="#7EE787"/>
  <circle class="n2" cx="68"  cy="160" r="3"   fill="#7EE787"/>
  <circle class="n3" cx="100" cy="108" r="5"   fill="#58A6FF"/>
  <circle class="n4" cx="162" cy="84"  r="3"   fill="#7EE787"/>
  <circle class="n5" cx="168" cy="152" r="3.5" fill="#58A6FF"/>

  <!-- ── RIGHT NEURAL CLUSTER ── -->
  <!-- Edges -->
  <line class="e7" x1="732" y1="70"  x2="800" y2="104" stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e8" x1="758" y1="168" x2="800" y2="104" stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e1" x1="800" y1="104" x2="852" y2="78"  stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e2" x1="800" y1="104" x2="856" y2="158" stroke="#58A6FF" stroke-width="0.9" fill="none"/>
  <line class="e3" x1="852" y1="78"  x2="856" y2="158" stroke="#7EE787" stroke-width="0.7" fill="none"/>
  <line class="e4" x1="732" y1="70"  x2="758" y2="168" stroke="#58A6FF" stroke-width="0.6" fill="none"/>
  <!-- Nodes -->
  <circle class="n6"  cx="732" cy="70"  r="3"   fill="#7EE787"/>
  <circle class="n7"  cx="758" cy="168" r="3"   fill="#7EE787"/>
  <circle class="n8"  cx="800" cy="104" r="5"   fill="#58A6FF"/>
  <circle class="n9"  cx="852" cy="78"  r="3"   fill="#7EE787"/>
  <circle class="n10" cx="856" cy="158" r="3.5" fill="#58A6FF"/>

  <!-- Scattered accent nodes -->
  <circle class="n2" cx="310" cy="28"  r="2"   fill="#58A6FF" opacity="0.5"/>
  <circle class="n5" cx="590" cy="222" r="2"   fill="#58A6FF" opacity="0.5"/>
  <circle class="n3" cx="430" cy="20"  r="1.5" fill="#7EE787" opacity="0.45"/>
  <circle class="n8" cx="670" cy="232" r="1.5" fill="#7EE787" opacity="0.45"/>

  <!-- ── STATUS INDICATOR — top-left ── -->
  <circle class="status" cx="22" cy="22" r="4" fill="#7EE787"/>
  <text x="31" y="27" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7EE787" opacity="0.85">SYSTEM ONLINE</text>

  <!-- VERSION TAG — top-right -->
  <text x="876" y="27" font-family="'Courier New', Courier, monospace" font-size="11" fill="#8B949E" text-anchor="end">ISE · RVCE · 2024–28</text>

  <!-- ── MAIN TITLE ── -->
  <text x="450" y="118"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="bold"
    fill="#58A6FF"
    text-anchor="middle"
    letter-spacing="10">VARUN ADITYA</text>

  <!-- TITLE UNDERLINE -->
  <line x1="195" y1="131" x2="705" y2="131" stroke="#58A6FF" stroke-width="0.5" opacity="0.3"/>

  <!-- ── SUBTITLE ── -->
  <text x="450" y="158"
    font-family="'Courier New', Courier, monospace"
    font-size="12.5"
    fill="#8B949E"
    text-anchor="middle"
    letter-spacing="4">SYSTEMS ARCHITECT  ·  AI ENGINEER  ·  BENGALURU</text>

  <!-- ── TAGLINE ── -->
  <text class="tagline" x="450" y="188"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5"
    fill="#58A6FF"
    text-anchor="middle"
    opacity="0.6">Building software that reasons beyond the prompt</text>

  <!-- BLINKING TERMINAL CURSOR -->
  <text class="cursor" x="450" y="214"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#7EE787"
    text-anchor="middle"
    opacity="0.75">$ █</text>

  <!-- BOTTOM META — left -->
  <text x="20" y="240"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    fill="#8B949E"
    opacity="0.6">CGPA 9.64 / 10</text>

  <!-- BOTTOM META — right -->
  <text x="880" y="240"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    fill="#8B949E"
    text-anchor="end"
    opacity="0.6">github.com/varunaditya27</text>
</svg>
